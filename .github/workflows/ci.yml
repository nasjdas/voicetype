name: CI

# The Windows code was written on a Mac. This is how it gets tested: GitHub runs
# a real Windows machine on every push, so "it imports and the Win32 calls bind"
# stops being a hope. It cannot test a human holding a key — see TESTING.md for
# what still needs a person.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shared:
    name: shared logic (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # No macos-13 (Intel): GitHub is retiring those runners and the job sits
        # queued forever, which never reports. Intel Macs run the same ONNX engine
        # the Windows job already exercises, so the code path is covered.
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (no ML libs — the shared logic needs none)
        run: python -m pip install --upgrade pip pyflakes

      - name: Everything compiles
        run: python -m compileall -q voicetype

      - name: Lint
        run: python -m pyflakes voicetype

      - name: Text layer — the rules that shape every dictation
        run: python -m unittest discover -s tests -v

  windows:
    name: windows — the parts only Windows can prove
    runs-on: windows-latest
    # `shell: python` runs each script from a temp file, so the repo root is NOT
    # on sys.path and `import voicetype` fails. Put it there explicitly.
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install for real, using the shipped requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: No Apple libraries leaked onto Windows
        shell: python
        run: |
          import importlib.util as u, sys
          leaked = [m for m in ("mlx", "parakeet_mlx", "rumps", "objc")
                    if u.find_spec(m) is not None]
          if leaked:
              sys.exit("markers failed — Windows installed: %s" % leaked)
          print("clean: no mlx, no rumps, no pyobjc")

      - name: The Windows backend imports and binds its Win32 calls
        shell: python
        run: |
          from voicetype.platform.windows import (
              WinPlatform, WinHotkeys, WinClipboard, WinKeystrokes)
          p = WinPlatform()
          assert p.hotkeys.modifier_name == "Right Ctrl"
          print("platform:", p.__class__.__name__, "| modifier:", p.hotkeys.modifier_name)

      - name: Handle-returning calls are pointer-sized, not truncated
        shell: python
        run: |
          # ctypes defaults restype to c_int. For a function returning a 64-bit
          # HANDLE that silently keeps only the low half: the call looks like it
          # worked, the handle is garbage, and the NEXT call fails for no visible
          # reason. That is the bug that broke the clipboard.
          #
          # Only handle/pointer returns matter. BOOL genuinely IS c_int, so a
          # blanket "nothing may be c_int" check is wrong and flags correct code.
          import ctypes
          from voicetype.platform import windows as w
          PTR = ctypes.sizeof(ctypes.c_void_p)
          handles = [(w.user32, "GetClipboardData"), (w.user32, "SetClipboardData"),
                     (w.user32, "SetWindowsHookExW"), (w.user32, "CallNextHookEx"),
                     (w.kernel32, "GlobalAlloc"), (w.kernel32, "GlobalLock"),
                     (w.kernel32, "GlobalFree")]
          for lib, n in handles:
              fn = getattr(lib, n)
              assert fn.restype is not None, "%s: no restype declared" % n
              got = ctypes.sizeof(fn.restype)
              assert got == PTR, \
                  "%s returns %d bytes, a pointer is %d - it will truncate" % (n, got, PTR)
          # And every one of these must declare argtypes, or the ARGUMENTS truncate.
          for lib, n in handles + [(w.user32, "SendInput"), (w.user32, "OpenClipboard")]:
              assert getattr(lib, n).argtypes is not None, "%s: no argtypes" % n
          print("handle returns are %d bytes; argtypes declared" % PTR)

      - name: The clipboard actually round-trips through Win32
        shell: python
        run: |
          from voicetype.platform.windows import WinClipboard
          c = WinClipboard()
          for s in ("hello", "åäö ÅÄÖ", "emoji 🎙 and — dashes", "x" * 100000, ""):
              assert c.set_text(s), "set_text failed on %r" % s[:40]
              got = c.get_text()
              assert got == s, "round-trip broke: %r -> %r" % (s[:40], (got or "")[:40])
          print("clipboard round-trips: unicode, emoji, 100k chars, empty")

      - name: SendInput accepts our INPUT struct
        shell: python
        run: |
          # If sizeof(INPUT) is wrong (the union must pad to MOUSEINPUT, its
          # largest member) Windows rejects every call and typing silently does
          # nothing. VK 0 is a harmless no-op key.
          import ctypes
          from voicetype.platform.windows import INPUT, KEYBDINPUT, _INPUTunion, user32
          size = ctypes.sizeof(INPUT)
          expected = 40 if ctypes.sizeof(ctypes.c_void_p) == 8 else 28
          assert size == expected, "sizeof(INPUT)=%d, Windows expects %d" % (size, expected)
          ki = KEYBDINPUT(wVk=0, wScan=0, dwFlags=0, time=0, dwExtraInfo=0)
          inp = INPUT(type=1, u=_INPUTunion(ki=ki))
          n = user32.SendInput(1, ctypes.byref(inp), size)
          assert n == 1, "SendInput rejected the struct (returned %d)" % n
          print("sizeof(INPUT) =", size, "— accepted")

      - name: The keyboard hook installs and uninstalls
        shell: python
        run: |
          from voicetype.platform.windows import WinHotkeys
          h = WinHotkeys()
          ok = h.start(lambda ev: None)
          print("SetWindowsHookEx ->", ok)
          h.stop()
          assert ok, "the low-level keyboard hook would not install"

      - name: The engine picker chooses ONNX on Windows
        shell: python
        run: |
          from voicetype.asr import get_engine
          e = get_engine()
          assert e.name == "parakeet-onnx", e.name
          print("engine:", e.name)

      - name: Store + dashboard work on Windows paths
        shell: python
        run: |
          from voicetype import store
          store.add("hello from windows ci", dur=1.5, lang="en", engine="ci")
          assert store.latest() == "hello from windows ci"
          assert store.count() >= 1
          s = store.stats()
          print("store ok:", s["entries"], "entries,", s["words"], "words")
          from voicetype import dashboard
          url = dashboard.start(modifier="Right Ctrl", engine="parakeet-onnx")
          import urllib.request, urllib.error, json
          port = url.split("//127.0.0.1:")[1].split("/")[0]
          tok = url.split("#t=")[1]
          r = urllib.request.Request("http://127.0.0.1:%s/api/bootstrap" % port)
          r.add_header("X-VoiceType-Token", tok)
          d = json.loads(urllib.request.urlopen(r, timeout=5).read())
          assert d["modifier"] == "Right Ctrl"
          # and it must still refuse an unauthenticated caller
          try:
              urllib.request.urlopen("http://127.0.0.1:%s/api/bootstrap" % port, timeout=5)
              raise SystemExit("SECURITY: dashboard served data with no token")
          except urllib.error.HTTPError as e:
              assert e.code == 401, e.code
          dashboard.stop()
          print("dashboard ok, and still refuses untokened callers")

  installer:
    name: installer parses
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: install.ps1 is valid PowerShell
        shell: pwsh
        run: |
          $errs = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "install.ps1", [ref]$null, [ref]$errs) | Out-Null
          if ($errs) { $errs | ForEach-Object { Write-Error $_.Message }; exit 1 }
          Write-Host "install.ps1 parses"
      - name: The pinned Python is still downloadable
        shell: pwsh
        run: |
          # python.org drops the Windows binary when a version goes security-only,
          # and the URL starts 404ing. That would break every new install silently,
          # so check it on every push rather than finding out from a bug report.
          $v = (Select-String -Path install.ps1 -Pattern '\$PyVer\s*=\s*"([\d.]+)"').Matches[0].Groups[1].Value
          foreach ($a in @("amd64","arm64")) {
            $u = "https://www.python.org/ftp/python/$v/python-$v-$a.exe"
            $c = (Invoke-WebRequest -Uri $u -Method Head -UseBasicParsing).StatusCode
            if ($c -ne 200) { Write-Error "$u -> $c"; exit 1 }
            Write-Host "$a ok"
          }
